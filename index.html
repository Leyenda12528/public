<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leyenda</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  position:relative;
  overflow:hidden;
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: #03050f;
}

.bg-base{
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 110%,
      rgba(30,10,90,.95) 0%,
      rgba(10,5,40,.7) 45%,
      transparent 70%),
    radial-gradient(ellipse 60% 50% at 15% 75%,
      rgba(20,0,120,.6) 0%,
      transparent 55%),
    radial-gradient(ellipse 50% 40% at 85% 70%,
      rgba(0,80,200,.4) 0%,
      transparent 50%),
    linear-gradient(180deg,
      #02030d 0%,
      #060818 40%,
      #040615 100%);
}

.stars{
  position:absolute;
  inset:0;
  background-image:
    radial-gradient(rgba(255,255,255,.9) 1px, transparent 1px),
    radial-gradient(rgba(255,255,255,.5) 1px, transparent 1px),
    radial-gradient(rgba(180,210,255,.7) 1px, transparent 1px);
  background-size:120px 120px, 80px 80px, 200px 200px;
  background-position: 0 0, 40px 40px, 10px 70px;
  opacity:.22;
}

.glow-center{
  position:absolute;
  width:700px;
  height:700px;
  border-radius:50%;
  background:radial-gradient(circle,
    rgba(0,140,255,.22) 0%,
    rgba(0,80,200,.1) 40%,
    transparent 70%);
  filter:blur(40px);
}

.plasma{
  position:absolute;
  inset:-50%;
  width:200%;
  height:200%;
  border-radius:43% 57% 61% 39% / 48% 52% 48% 52%;
  border: 1.5px solid rgba(0,160,255,.18);
  filter:blur(1px);
  animation:morph1 18s ease-in-out infinite;
}
.plasma2{
  position:absolute;
  inset:-50%;
  width:200%;
  height:200%;
  border-radius:57% 43% 39% 61% / 52% 48% 52% 48%;
  border: 1px solid rgba(80,80,255,.14);
  filter:blur(1px);
  animation:morph2 22s ease-in-out infinite;
}
.plasma3{
  position:absolute;
  inset:-50%;
  width:200%;
  height:200%;
  border-radius:35% 65% 55% 45% / 45% 55% 45% 55%;
  border: 1px solid rgba(0,200,255,.10);
  filter:blur(.5px);
  animation:morph1 28s ease-in-out infinite reverse;
}

@keyframes morph1{
  0%,100%{border-radius:43% 57% 61% 39% / 48% 52% 48% 52%; transform:rotate(0deg) scale(1);}
  33%{border-radius:61% 39% 43% 57% / 52% 48% 52% 48%; transform:rotate(60deg) scale(1.04);}
  66%{border-radius:50% 50% 35% 65% / 60% 40% 60% 40%; transform:rotate(120deg) scale(.97);}
}
@keyframes morph2{
  0%,100%{border-radius:57% 43% 39% 61% / 52% 48% 52% 48%; transform:rotate(0deg);}
  50%{border-radius:39% 61% 57% 43% / 48% 52% 48% 52%; transform:rotate(-90deg) scale(1.06);}
}

.wave-bottom-purple{
  position:absolute;
  width:130%;
  height:380px;
  left:-15%;
  bottom:-140px;
  border-radius:50%;
  background:radial-gradient(ellipse at 40% 80%,
    rgba(100,30,255,.55) 0%,
    rgba(70,20,180,.25) 40%,
    transparent 70%);
  filter:blur(35px);
}

.wave-bottom-blue{
  position:absolute;
  width:140%;
  height:350px;
  right:-20%;
  bottom:-160px;
  border-radius:50%;
  background:radial-gradient(ellipse at 60% 80%,
    rgba(0,120,255,.5) 0%,
    rgba(0,80,200,.2) 40%,
    transparent 70%);
  filter:blur(45px);
}

.beam-left{
  position:absolute;
  width:400px;
  height:900px;
  left:-80px;
  bottom:-100px;
  background: linear-gradient(70deg,
    rgba(60,30,180,.35) 0%,
    rgba(0,100,255,.15) 50%,
    transparent 80%);
  border-radius:50%;
  filter:blur(50px);
  transform:rotate(-15deg);
}

.beam-right{
  position:absolute;
  width:350px;
  height:800px;
  right:-60px;
  bottom:-80px;
  background: linear-gradient(250deg,
    rgba(0,100,220,.3) 0%,
    rgba(40,0,180,.12) 50%,
    transparent 80%);
  border-radius:50%;
  filter:blur(60px);
  transform:rotate(15deg);
}

.horizon{
  position:absolute;
  width:100%;
  height:2px;
  bottom:28%;
  left:0;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(0,150,255,.0) 10%,
    rgba(80,160,255,.35) 30%,
    rgba(120,180,255,.55) 50%,
    rgba(80,160,255,.35) 70%,
    rgba(0,150,255,.0) 90%,
    transparent 100%);
  filter:blur(2px);
}

.shooting-star{
  position:absolute;
  height:1.5px;
  border-radius:999px;
  background:linear-gradient(90deg,
    rgba(255,255,255,0) 0%,
    rgba(180,220,255,.9) 50%,
    rgba(255,255,255,1) 80%,
    rgba(255,255,255,0) 100%);
  opacity:0;
  z-index:50;
}

.s1{
  width:220px;
  top:22%;
  left:-240px;
  transform:rotate(-18deg);
  animation:shoot1 7s ease-in-out 1.5s infinite;
}

.s2{
  width:160px;
  top:58%;
  left:-180px;
  transform:rotate(-12deg);
  animation:shoot1 7s ease-in-out 4.8s infinite;
}

@keyframes shoot1{
  0%{opacity:0; transform:rotate(-18deg) translateX(0);}
  5%{opacity:1;}
  40%{opacity:0; transform:rotate(-18deg) translateX(130vw);}
  100%{opacity:0; transform:rotate(-18deg) translateX(130vw);}
}

.logo{
  position:relative;
  z-index:100;
  width:700px;
  max-width:82vw;
  filter:
    drop-shadow(0 0 6px rgba(0,180,255,.7))
    drop-shadow(0 0 20px rgba(0,160,255,.4))
    drop-shadow(0 0 55px rgba(0,140,255,.2));
}
</style>
</head>
<body>

  <div class="bg-base"></div>
  <div class="stars"></div>

  <div class="beam-left"></div>
  <div class="beam-right"></div>

  <div class="wave-bottom-purple"></div>
  <div class="wave-bottom-blue"></div>

  <div class="plasma"></div>
  <div class="plasma2"></div>
  <div class="plasma3"></div>

  <div class="glow-center"></div>
  <div class="shooting-star s1"></div>
  <div class="shooting-star s2"></div>
  <div class="horizon"></div>

  <img
    src="https://leyenda12528.github.io/public/assets/img/Logo.png"
    class="logo"
    alt="Leyenda">

</body>
</html>
