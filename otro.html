<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leyenda</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;

    background:
        radial-gradient(circle at 20% 20%, rgba(0,120,255,.15), transparent 30%),
        radial-gradient(circle at 80% 70%, rgba(0,80,255,.12), transparent 40%),
        linear-gradient(135deg,#02040b,#071221,#03050c);
}

/* Partículas */

body::before{
    content:"";
    position:absolute;
    inset:0;

    background-image:
        radial-gradient(circle, rgba(255,255,255,.3) 1px, transparent 1px);

    background-size:80px 80px;

    opacity:.15;
}

/* Onda morada */

.wave-purple{
    position:absolute;
    width:1200px;
    height:500px;

    left:-300px;
    bottom:-120px;

    border-radius:50%;

    background:
        radial-gradient(
            ellipse at center,
            rgba(125,70,255,.30),
            transparent 70%
        );

    filter:blur(60px);
}

/* Onda azul */

.wave-blue{
    position:absolute;
    width:1400px;
    height:500px;

    right:-300px;
    bottom:-180px;

    border-radius:50%;

    background:
        radial-gradient(
            ellipse at center,
            rgba(0,150,255,.25),
            transparent 70%
        );

    filter:blur(80px);
}

/* Curvas decorativas */

.lines{
    position:absolute;
    inset:0;
    pointer-events:none;
}

.lines::before,
.lines::after{
    content:"";
    position:absolute;

    width:120%;
    height:120%;

    border-radius:50%;

    border:1px solid rgba(0,140,255,.08);
}

.lines::before{
    top:40%;
    left:30%;
    transform:rotate(-15deg);
}

.lines::after{
    top:35%;
    left:20%;
    transform:rotate(10deg);
}

/* Contenedor central */



/* Logo */

.logo{
    width:550px;
    max-width:80vw;

    filter:
        drop-shadow(0 0 25px rgba(0,180,255,.50))
        drop-shadow(0 0 80px rgba(0,180,255,.20));
}

</style>
</head>
<body>

<div class="wave-purple"></div>
<div class="wave-blue"></div>
<div class="lines"></div>

<div class="hero">
    <img src="https://avatars.githubusercontent.com/u/40256629?v=4&size=1285" alt="Leyenda" class="logo">
</div>

</body>
</html>
